# 宿主机 Nginx 示例：把公网 80 端口的流量全部反代到 Docker 里的 web 容器
# （Docker 映射为 127.0.0.1:8080 → 容器 80，见 .env 中 WEB_PORT）
#
# 使用步骤（Alibaba Linux / CentOS 等）：
# 1) dnf install -y nginx
# 2) 备份默认站点：mv /etc/nginx/conf.d/default.conf /etc/nginx/conf.d/default.conf.bak
# 3) 复制本文件为：/etc/nginx/conf.d/koubo.conf
# 4) 将下面 upstream 中的 8080 改成与你 .env 的 WEB_PORT 一致
# 5) nginx -t && systemctl reload nginx
#
# 若希望「只让 Docker 占 80」，可卸载/停用宿主机 Nginx，把 docker-compose 里 WEB_PORT=80。

upstream koubo_web_docker {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 30m;

    location / {
        proxy_pass http://koubo_web_docker;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 620s;
        proxy_send_timeout 620s;
    }
}
