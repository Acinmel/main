# 线上/内网一体化：Web（Nginx+静态）→ API（Nest + yt-dlp + ffmpeg）→ Whisper（Python）
# 使用：在项目根目录执行  docker compose up -d --build
# 访问：http://localhost:8080  （API 经同域 /api 反代，浏览器无需单独配后端地址）
#
# 数据：MySQL 8（用户 / 数字人元数据）；任务流水线仍为内存态（见 TasksService）。

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    # 小内存 ECS 上 InnoDB 默认池较大易 OOM，进程被内核杀（容器 exit 137）→ unhealthy
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_buffer_pool_size=64M
      - --performance_schema=OFF
      - --table_open_cache=200
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-koubo}
      MYSQL_USER: ${MYSQL_USER:-koubo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-koubo}
    volumes:
      - mysql_data:/var/lib/mysql
    # 宿主机端口；与本机已装的 MySQL 冲突时在根 .env 设 MYSQL_HOST_PORT=3307（api 仍连容器内 mysql:3306）
    ports:
      - '127.0.0.1:${MYSQL_HOST_PORT:-3306}:3306'
    networks: [kb_net]
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  whisper:
    build:
      context: ./backend/whisper-python-service
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-1}
    restart: unless-stopped
    environment:
      # 2GB 内存 ECS 建议 .env 保持 base；内存充足可设 medium
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      # 设为 1 时启动即加载模型，首包慢但首用户转写更快（健康检查会等服务监听后再通过）
      WHISPER_PRELOAD: ${WHISPER_PRELOAD:-0}
    # 本机直接跑 Nest（npm run start:dev）时，宿主机可经此端口访问 Whisper，与 backend/.env 中
    # WHISPER_HTTP_URL=http://127.0.0.1:8010/transcribe 对齐；纯容器内联调时 api 仍用服务名 whisper:8010
    # 仅绑定本机回环，避免 Whisper 端口对公网直连暴露（容器内 api → whisper 不受影响）
    ports:
      - '127.0.0.1:8010:8010'
    networks: [kb_net]
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5)",
        ]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-1}
    restart: unless-stopped
    # 连接宿主机上的 MySQL 时：.env 中设 MYSQL_HOST=host.docker.internal，并注释掉本文件中的 mysql 服务及 api 对 mysql 的 depends_on
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # 根 .env 先，backend/.env 后（后加载覆盖同名键 → 仅写在 backend/.env 的 ARK 可覆盖根里空的 ARK_API_KEY=）
    # 模板勿含「ARK_API_KEY=」空赋值；若根 .env 仍有该行请删掉或填实值。
    env_file:
      - path: .env
        required: false
      - path: backend/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: '3000'
      # 与下方 mysql 服务一致；使用宿主机 MySQL 时在 .env 中覆盖 MYSQL_HOST / 用户库名
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-koubo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-koubo}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-koubo}
      JWT_SECRET: ${JWT_SECRET:-}
      # 注册/登录 bcrypt 轮数；小内存 ECS 用 8 可降低 OOM 导致 Nginx 502
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-8}
      # Nginx 反代时识别 X-Forwarded-*（限流、审计等如需真实客户端 IP）
      TRUST_PROXY: '1'
      # 前后端分离部署时填写浏览器 Origin，逗号分隔；留空则与开发一致（origin: true）
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      WHISPER_HTTP_URL: http://whisper:8010/transcribe
      WHISPER_HTTP_HEALTH_URL: http://whisper:8010/health
      WHISPER_HTTP_TIMEOUT_MS: '600000'
      YTDLP_BIN: /usr/local/bin/yt-dlp
      YTDLP_TIMEOUT_MS: '300000'
      # 抖音 Cookie 仅由根目录 env_file .env 注入（勿用 ${} 展开，避免值中含 $ 被 compose 误解析）
      DY_DOWNLOADER_FETCH_TIMEOUT_MS: ${DY_DOWNLOADER_FETCH_TIMEOUT_MS:-120000}
      # Linux 容器内落盘目录（与源码包内默认 Windows 路径无关）
      VIDEO_SAVE_DIR: ${VIDEO_SAVE_DIR:-/data/download-video}
      # 固定为镜像内 apt 安装的 ffmpeg；勿用 ${FFMPEG_BIN:-} — 宿主 .env 里 Windows 路径会误入容器导致「FFmpeg 不可用」
      FFMPEG_BIN: /usr/bin/ffmpeg
      # 数字人形象落盘（与默认 data/digital-humans 一致，避免容器重建丢文件）
      DIGITAL_HUMAN_STORAGE_DIR: ${DIGITAL_HUMAN_STORAGE_DIR:-/workspace/backend/data/digital-humans}
      # ARK_API_KEY / SEEDREAM_* / DIGITAL_HUMAN_* / OPENAI_* / DY_DOWNLOADER_COOKIE：
      # 写在根 .env 或 backend/.env（见上方 env_file）；勿在此用 ${VAR:-} 覆盖成空
    volumes:
      - video_downloads:/data/download-video
      - digital_human_storage:/workspace/backend/data/digital-humans
    depends_on:
      mysql:
        condition: service_healthy
      whisper:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/api').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 90s
    networks: [kb_net]

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        USE_CN_MIRROR: ${USE_CN_MIRROR:-1}
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [kb_net]

volumes:
  mysql_data:
  video_downloads:
  digital_human_storage:

networks:
  kb_net:
    driver: bridge
